  <text x="626" y="513" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a1a1aa">The one idea behind transformers: attention weighs every token at once —</text>
  <text x="626" y="529" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a1a1aa">that's why it scales. Full breakdown linked below. 👇</text>
