    <text x="804" y="358" font-size="12" font-weight="600" fill="#f4f4f5">Motion</text>
    <rect x="848" y="349" width="28" height="12" rx="4" fill="#0ea5e9" fill-opacity="0.18" stroke="#0ea5e9" stroke-opacity="0.3"/>
