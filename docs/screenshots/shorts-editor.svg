    <line x1="198" y1="607" x2="198" y2="623"/><line x1="214" y1="610" x2="214" y2="620"/>
    <line x1="230" y1="608" x2="230" y2="622"/><line x1="246" y1="612" x2="246" y2="618"/>
    <line x1="262" y1="607" x2="262" y2="623"/><line x1="278" y1="610" x2="278" y2="620"/>
    <line x1="294" y1="609" x2="294" y2="621"/><line x1="310" y1="606" x2="310" y2="624"/>
