<svg width="1200" height="750" viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ChannelHelm Shorts editor — 9:16 preview with live captions, word-snap trim, and per-clip publishing panels">
